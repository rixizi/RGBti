<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RGBTI 2.1 - 深度灵魂色彩测评（支持撤回）</title>
    <style>
      :root {
        --card-bg: rgba(255, 255, 255, 0.95);
        --text-main: #2c3e50;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background-color: #f0f2f5;
        transition: background-color 1s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text-main);
      }

      #app {
        width: 95%;
        max-width: 500px;
        background: var(--card-bg);
        padding: 2.5rem;
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(15px);
        text-align: center;
      }

      .progress-container {
        width: 100%;
        height: 6px;
        background: #e0e0e0;
        border-radius: 3px;
        margin-bottom: 2rem;
        overflow: hidden;
      }

      #progress {
        height: 100%;
        background: #333;
        width: 0%;
        transition: width 0.3s ease;
      }

      .nav-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        font-size: 0.85rem;
        color: #888;
      }

      #back-btn {
        background: none;
        border: none;
        color: #007aff;
        cursor: pointer;
        padding: 5px 10px;
        font-size: 0.85rem;
        visibility: hidden; /* 默认隐藏 */
      }

      h2 {
        margin-bottom: 2rem;
        font-size: 1.3rem;
        line-height: 1.5;
        min-height: 4rem;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .opt-btn {
        padding: 16px 20px;
        border: 1px solid #eee;
        border-radius: 15px;
        background: white;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
        text-align: left;
      }

      .opt-btn:hover {
        border-color: #333;
        transform: translateY(-2px);
        background: #fafafa;
      }

      #result {
        display: none;
      }

      .result-card {
        padding: 30px;
        border-radius: 20px;
        color: white;
        margin-bottom: 1.5rem;
        box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.1);
      }

      .color-name {
        font-size: 2rem;
        font-weight: bold;
        margin: 10px 0;
      }
      .hex-value {
        font-family: monospace;
        opacity: 0.9;
        letter-spacing: 1px;
      }

      .description {
        text-align: left;
        line-height: 1.8;
        margin: 1.5rem 0;
        font-size: 1.05rem;
      }

      .restart-btn {
        width: 100%;
        padding: 15px;
        background: #333;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1rem;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="start-screen">
        <h1 style="font-size: 3rem; margin-bottom: 0.5rem">RGBTI</h1>
        <p style="color: #666; margin-bottom: 2rem">15 维光谱人格精准扫描</p>
        <button class="restart-btn" onclick="startQuiz()">开始扫描</button>
      </div>

      <div id="quiz" class="hidden">
        <div class="nav-header">
          <button id="back-btn" onclick="goBack()">← 上一题</button>
          <span id="question-num">1 / 15</span>
        </div>
        <div class="progress-container"><div id="progress"></div></div>
        <h2 id="question">正在连接灵魂频率...</h2>
        <div class="options" id="options"></div>
      </div>

      <div id="result">
        <div class="result-card" id="result-visual">
          <div class="hex-value" id="res-hex">#FFFFFF</div>
          <div class="color-name" id="res-name">颜色名称</div>
        </div>
        <div class="description" id="res-desc"></div>
        <button class="restart-btn" onclick="location.reload()">
          重新测试
        </button>
      </div>
    </div>

    <script>
      const questions = [
        {
          q: "面对全新的挑战，你通常会？",
          options: [
            { t: "充满斗志，立刻制定计划占领高地", type: "r" },
            { t: "观察环境，确保大家都在舒适区", type: "g" },
            { t: "搜集资料，分析其背后的运作逻辑", type: "b" },
          ],
        },
        {
          q: "你理想的工作环境更偏向？",
          options: [
            { t: "高节奏、充满竞争与奖励", type: "r" },
            { t: "和谐、注重团队情感和平衡", type: "g" },
            { t: "安静、允许深度独立思考", type: "b" },
          ],
        },
        {
          q: "如果用一个词形容你的社交状态？",
          options: [
            { t: "火热焦点", type: "r" },
            { t: "温润粘合", type: "g" },
            { t: "疏离冷静", type: "b" },
          ],
        },
        {
          q: "当你看到不公平的事情发生时？",
          options: [
            { t: "义愤填膺，直接站出来指正", type: "r" },
            { t: "感到难过，尝试安抚受害者", type: "g" },
            { t: "客观评估，寻找最合理的解决路径", type: "b" },
          ],
        },
        {
          q: "在创作（如写代码或摄影）时你更看重？",
          options: [
            { t: "作品带来的冲击力和感染力", type: "r" },
            { t: "作品传递的温度和普适性", type: "g" },
            { t: "作品的结构严谨与技术高度", type: "b" },
          ],
        },
        {
          q: "面对突如其来的变故？",
          options: [
            { t: "迅速反应，尝试控制局面", type: "r" },
            { t: "接纳情绪，慢慢适应节奏", type: "g" },
            { t: "冷静复盘，寻找逻辑漏洞", type: "b" },
          ],
        },
        {
          q: "你的穿衣风格更倾向于？",
          options: [
            { t: "明亮亮眼，展现个性", type: "r" },
            { t: "柔和舒适，低调大方", type: "g" },
            { t: "冷色调或极简黑白灰", type: "b" },
          ],
        },
        {
          q: "你认为什么最能代表你的成功？",
          options: [
            { t: "赢得了多少次艰难的博弈", type: "r" },
            { t: "帮助了多少人并获得尊重", type: "g" },
            { t: "攻克了多少复杂的难题", type: "b" },
          ],
        },
        {
          q: "在处理信息时，你更倾向于？",
          options: [
            { t: "直觉先行，抓住关键点", type: "r" },
            { t: "感官先行，体会细节美", type: "g" },
            { t: "逻辑先行，构建知识网", type: "b" },
          ],
        },
        {
          q: "当别人评价你“太理性”时，你会？",
          options: [
            { t: "认为这是褒奖，说明我有主见", type: "r" },
            { t: "稍微有点失落，怕显得冷漠", type: "g" },
            { t: "完全同意，认为理性是美德", type: "b" },
          ],
        },
        {
          q: "假期如果你必须出门，你会去？",
          options: [
            { t: "充满活力的城市中心或赛场", type: "r" },
            { t: "充满绿意的郊外或疗愈中心", type: "g" },
            { t: "充满神秘感的博物馆或实验室", type: "b" },
          ],
        },
        {
          q: "你如何看待竞争？",
          options: [
            { t: "必须赢，竞争是进化的动力", type: "r" },
            { t: "重在参与，不希望伤害和气", type: "g" },
            { t: "没兴趣赢，只对自我超越感兴趣", type: "b" },
          ],
        },
        {
          q: "你的桌面通常是？",
          options: [
            { t: "略显凌乱但充满了战斗痕迹", type: "r" },
            { t: "摆放了绿植或温馨的小物件", type: "g" },
            { t: "极简风格，所有东西归位", type: "b" },
          ],
        },
        {
          q: "对于未来的规划？",
          options: [
            { t: "我有野心勃勃的蓝图", type: "r" },
            { t: "我希望过上稳健幸福的生活", type: "g" },
            { t: "我追求真理和认知的终点", type: "b" },
          ],
        },
        {
          q: "你的口头禅更接近？",
          options: [
            { t: "“搞定它！”", type: "r" },
            { t: "“听你的。”", type: "g" },
            { t: "“为什么？”", type: "b" },
          ],
        },
      ];

      let currentStep = 0;
      // 使用数组记录历史状态，每一项包含当时的 {r, g, b}
      let history = [{ r: 100, g: 100, b: 100 }];

      function startQuiz() {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("quiz").classList.remove("hidden");
        showQuestion();
      }

      function showQuestion() {
        if (currentStep >= questions.length) {
          showResult();
          return;
        }

        // 更新 UI
        document.getElementById("question-num").innerText = `${
          currentStep + 1
        } / ${questions.length}`;
        document.getElementById("question").innerText =
          questions[currentStep].q;
        document.getElementById("progress").style.width =
          (currentStep / questions.length) * 100 + "%";

        // 控制返回按钮显示
        document.getElementById("back-btn").style.visibility =
          currentStep > 0 ? "visible" : "hidden";

        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        questions[currentStep].options.forEach((opt) => {
          const btn = document.createElement("button");
          btn.className = "opt-btn";
          btn.innerText = opt.t;
          btn.onclick = () => handleAnswer(opt.type);
          optionsDiv.appendChild(btn);
        });

        // 背景色同步当前分数
        const currentScore = history[currentStep];
        document.body.style.backgroundColor = `rgb(${currentScore.r}, ${currentScore.g}, ${currentScore.b})`;
      }

      function handleAnswer(type) {
        const prevScore = history[currentStep];
        let newScore = { ...prevScore };

        const inc = 40;
        const dec = 12;

        if (type === "r") {
          newScore.r += inc;
          newScore.g -= dec;
          newScore.b -= dec;
        }
        if (type === "g") {
          newScore.g += inc;
          newScore.r -= dec;
          newScore.b -= dec;
        }
        if (type === "b") {
          newScore.b += inc;
          newScore.r -= dec;
          newScore.g -= dec;
        }

        // 边界修正
        for (let k in newScore)
          newScore[k] = Math.max(20, Math.min(255, newScore[k]));

        history.push(newScore);
        currentStep++;
        showQuestion();
      }

      function goBack() {
        if (currentStep > 0) {
          history.pop(); // 移除当前步的分数记录
          currentStep--;
          showQuestion();
        }
      }

      function showResult() {
        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("result").style.display = "block";

        const finalScore = history[history.length - 1];
        const hex = rgbToHex(finalScore.r, finalScore.g, finalScore.b);
        const res = analyzeDetailed(finalScore);

        document.getElementById("res-hex").innerText = hex;
        document.getElementById("res-name").innerText = res.name;
        document.getElementById("res-desc").innerText = res.desc;
        document.getElementById("result-visual").style.backgroundColor = hex;
        document.body.style.backgroundColor = hex;
      }

      function rgbToHex(r, g, b) {
        const toHex = (c) =>
          Math.round(c).toString(16).padStart(2, "0").toUpperCase();
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
      }

      function analyzeDetailed(s) {
        const { r, g, b } = s;
        if (r > 200 && g < 120 && b < 120)
          return {
            name: "极境绯红",
            desc: "你是绝对的行动派。生命中没有“撤退”二字，热情是你的燃料，直率是你的名片。在群体中，你总是那个破冰并指引方向的人。",
          };
        if (g > 200 && r < 120 && b < 120)
          return {
            name: "萤光森绿",
            desc: "你拥有惊人的共情力。你是天生的疗愈者，总能在混乱中带来平和。大家信任你，因为你总能站在他人的角度思考。",
          };
        if (b > 200 && r < 120 && g < 120)
          return {
            name: "深海极蓝",
            desc: "理智是你的基石。你习惯于在喧嚣中保持思考，极度排斥逻辑上的混乱。你的灵魂深度往往让人感到神秘且迷人。",
          };
        if (r > 190 && g > 190 && b < 130)
          return {
            name: "向日葵金",
            desc: "活力与亲和力的完美结合。你不仅有行动力，更有极强的社交天赋。你既擅长领导也擅长协作，像太阳一样照亮周围。",
          };
        if (r > 190 && b > 190 && g < 130)
          return {
            name: "赛博电紫",
            desc: "你是理想主义的极客。你既有艺术家的创造力，又有执行者的手腕。你经常在脑海里构建未来，并将其变为现实。",
          };
        if (g > 180 && b > 180 && r < 130)
          return {
            name: "湖泊青翠",
            desc: "冷静、温和且客观。你很少被情绪左右，像一面明镜，总能给周围的人提供最冷静、最中肯的建议。",
          };
        if (r > 160 && g > 160 && b > 160)
          return {
            name: "极简纯白",
            desc: "全能且平衡。你几乎没有短板，能根据环境的需求随时调整自己的光谱。你是顶级的通才，能驾驭各种复杂的局面。",
          };
        if (r < 110 && g < 110 && b < 110)
          return {
            name: "玄武暗岩",
            desc: "低调、沉稳且自洽。你不追求外界的认同，内心的秩序是你最大的力量源泉。你是一个深藏不露的思想家。",
          };
        return {
          name: "摩登中灰",
          desc: "理智且独立。你深谙平衡之道，既不盲从热血，也不陷入忧郁。你是一个极佳的观察者和决策辅助者。",
        };
      }
    </script>
  </body>
</html>
