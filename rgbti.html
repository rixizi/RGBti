<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGBTI 2.0 - 深度灵魂色彩测评</title>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2c3e50;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5;
            transition: background-color 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        #app {
            width: 95%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(15px);
            text-align: center;
            position: relative;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 2.5rem;
            overflow: hidden;
        }

        #progress {
            height: 100%;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            width: 0%;
            transition: width 0.4s ease;
        }

        #question-num {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 0.5rem;
            display: block;
        }

        h2 { margin-bottom: 2rem; font-size: 1.4rem; line-height: 1.4; }

        .options { display: flex; flex-direction: column; gap: 15px; }

        button {
            padding: 18px 25px;
            border: 1px solid #ddd;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            text-align: left;
        }

        button:hover {
            background: #f8f9fa;
            border-color: #999;
            transform: scale(1.02);
        }

        #result { display: none; }

        .result-box {
            padding: 20px;
            border-radius: 20px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 1.5rem;
        }

        .color-title { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .hex-tag { font-family: monospace; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; font-size: 1.1rem; }

        .desc-text { text-align: left; line-height: 1.8; margin: 1.5rem 0; color: #444; }

        .hidden { display: none; }

        .start-screen h1 { font-size: 2.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="start-screen">
        <h1>RGBTI</h1>
        <p>基于色彩心理学的 15 维度人格扫描</p>
        <button onclick="startQuiz()" style="text-align: center; margin-top: 20px; width: 100%; background: #333; color: white;">开启色彩溯源</button>
    </div>

    <div id="quiz" class="hidden">
        <span id="question-num">Question 1/15</span>
        <div class="progress-container"><div id="progress"></div></div>
        <h2 id="question">正在连接灵魂频率...</h2>
        <div class="options" id="options"></div>
    </div>

    <div id="result">
        <div class="result-box" id="result-visual">
            <div class="hex-tag" id="res-hex">#FFFFFF</div>
            <div class="color-title" id="res-name">颜色名称</div>
        </div>
        <div class="desc-text" id="res-desc"></div>
        <button onclick="location.reload()" style="width:100%; text-align:center;">重新测评</button>
    </div>
</div>

<script>
    const questions = [
        { q: "面对全新的挑战，你通常会？", options: [{t:"充满斗志，立刻制定计划占领高地", type:"r"}, {t:"观察环境，确保大家都在舒适区", type:"g"}, {t:"搜集资料，分析其背后的运作逻辑", type:"b"}]},
        { q: "你理想的工作环境更偏向？", options: [{t:"高节奏、充满竞争与奖励", type:"r"}, {t:"和谐、注重团队情感和平衡", type:"g"}, {t:"安静、允许深度独立思考", type:"b"}]},
        { q: "如果用一个词形容你的社交状态？", options: [{t:"火热焦点", type:"r"}, {t:"温润粘合", type:"g"}, {t:"疏离冷静", type:"b"}]},
        { q: "当你看到不公平的事情发生时？", options: [{t:"义愤填膺，直接站出来指正", type:"r"}, {t:"感到难过，尝试安抚受害者", type:"g"}, {t:"客观评估，寻找最合理的解决路径", type:"b"}]},
        { q: "在创作（如写代码或摄影）时你更看重？", options: [{t:"作品带来的冲击力和感染力", type:"r"}, {t:"作品传递的温度和普适性", type:"g"}, {t:"作品的结构严谨与技术高度", type:"b"}]},
        { q: "面对突如其来的变故？", options: [{t:"迅速反应，尝试控制局面", type:"r"}, {t:"接纳情绪，慢慢适应节奏", type:"g"}, {t:"冷静复盘，寻找逻辑漏洞", type:"b"}]},
        { q: "你的穿衣风格更倾向于？", options: [{t:"明亮亮眼，展现个性", type:"r"}, {t:"柔和舒适，低调大方", type:"g"}, {t:"冷色调或极简黑白灰", type:"b"}]},
        { q: "你认为什么最能代表你的成功？", options: [{t:"赢得了多少次艰难的博弈", type:"r"}, {t:"帮助了多少人并获得尊重", type:"g"}, {t:"攻克了多少复杂的难题", type:"b"}]},
        { q: "在处理信息时，你更倾向于？", options: [{t:"直觉先行，抓住关键点", type:"r"}, {t:"感官先行，体会细节美", type:"g"}, {t:"逻辑先行，构建知识网", type:"b"}]},
        { q: "当别人评价你“太理性”时，你会？", options: [{t:"认为这是褒奖，说明我有主见", type:"r"}, {t:"稍微有点失落，怕显得冷漠", type:"g"}, {t:"完全同意，认为理性是美德", type:"b"}]},
        { q: "假期如果你必须出门，你会去？", options: [{t:"充满活力的城市中心或赛场", type:"r"}, {t:"充满绿意的郊外或疗愈中心", type:"g"}, {t:"充满神秘感的博物馆或实验室", type:"b"}]},
        { q: "你如何看待竞争？", options: [{t:"必须赢，竞争是进化的动力", type:"r"}, {t:"重在参与，不希望伤害和气", type:"g"}, {t:"没兴趣赢，只对自我超越感兴趣", type:"b"}]},
        { q: "你的桌面通常是？", options: [{t:"略显凌乱但充满了战斗痕迹", type:"r"}, {t:"摆放了绿植或温馨的小物件", type:"g"}, {t:"极简风格，所有东西归位", type:"b"}]},
        { q: "对于未来的规划？", options: [{t:"我有野心勃勃的蓝图", type:"r"}, {t:"我希望过上稳健幸福的生活", type:"g"}, {t:"我追求真理和认知的终点", type:"b"}]},
        { q: "你的口头禅更接近？", options: [{t:"“搞定它！”", type:"r"}, {t:"“听你的。”", type:"g"}, {t:"“为什么？”", type:"b"}]}
    ];

    let currentStep = 0;
    let scores = { r: 100, g: 100, b: 100 };

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentStep >= questions.length) { showResult(); return; }
        const qData = questions[currentStep];
        document.getElementById('question-num').innerText = `Question ${currentStep + 1}/15`;
        document.getElementById('question').innerText = qData.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt.t;
            btn.onclick = () => handleAnswer(opt.type);
            optionsDiv.appendChild(btn);
        });
        document.getElementById('progress').style.width = (currentStep / questions.length) * 100 + '%';
    }

    function handleAnswer(type) {
        const inc = 45;
        const dec = 15;
        if (type === 'r') { scores.r += inc; scores.g -= dec; scores.b -= dec; }
        if (type === 'g') { scores.g += inc; scores.r -= dec; scores.b -= dec; }
        if (type === 'b') { scores.b += inc; scores.r -= dec; scores.g -= dec; }

        for (let k in scores) scores[k] = Math.max(20, Math.min(255, scores[k]));
        document.body.style.backgroundColor = `rgb(${scores.r}, ${scores.g}, ${scores.b})`;
        currentStep++;
        showQuestion();
    }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').style.display = 'block';
        const hex = rgbToHex(scores.r, scores.g, scores.b);
        const res = analyzeDetailed(scores);
        
        document.getElementById('res-hex').innerText = hex;
        document.getElementById('res-name').innerText = res.name;
        document.getElementById('res-desc').innerText = res.desc;
        document.getElementById('result-visual').style.backgroundColor = hex;
        document.body.style.backgroundColor = hex;
    }

    function rgbToHex(r, g, b) {
        const toHex = (c) => Math.round(c).toString(16).padStart(2, '0').toUpperCase();
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function analyzeDetailed(s) {
        const {r, g, b} = s;
        // 逻辑：判断主色调与性格映射
        if (r > 200 && g < 100 && b < 100) return {name: "极境绯红 (Victory Red)", desc: "你拥有绝对的统治力与爆发力。你是天生的开拓者，在任何环境下都能迅速锁定目标并付诸行动。你的性格中没有退缩，只有征服。"};
        if (g > 200 && r < 100 && b < 100) return {name: "萤光森绿 (Healing Green)", desc: "你是最极致的和平主义者。你拥有惊人的共情能力，能够像植物光合作用一样化解周围的戾气。你的存在本身就是一种治愈。"};
        if (b > 200 && r < 100 && g < 100) return {name: "深海极蓝 (Logic Blue)", desc: "你是纯粹的理性化身。你的思维像深海一样寂静而深邃，极度排斥逻辑上的混乱。你追求真相，更胜过追求快乐。"};
        if (r > 200 && g > 180 && b < 100) return {name: "向日葵金 (Solar Gold)", desc: "活力与亲和力的完美结合。你不仅有行动力，更有极强的社交天赋。你是一个温暖的领导者，总能带领团队快乐地走向胜利。"};
        if (r > 200 && b > 180 && g < 100) return {name: "赛博电紫 (Cyber Purple)", desc: "你是理想主义的极客。你既有艺术家的创造力，又有执行者的手腕。你经常在脑海里构建未来，并有能力将其变为现实。"};
        if (g > 180 && b > 200 && r < 100) return {name: "湖泊青翠 (Cyan Soul)", desc: "冷静、温和且客观。你很少被情绪左右，像一面明镜，总能给周围的人提供最冷静、最中肯的建议。"};
        if (r > 150 && g > 150 && b > 150) return {name: "极简纯白 (Pure Prism)", desc: "全能且平衡。你几乎没有短板，能根据环境的需求随时调整自己的光谱。你是顶级的通才，能驾驭各种复杂的局面。"};
        if (r < 100 && g < 100 && b < 100) return {name: "玄武暗岩 (Obsidian)", desc: "低调、沉稳且具有极强的防御力。你并不追求外界的认同，内心的自洽是你最大的力量源泉。你是一个深藏不露的思想家。"};
        if (r > 180 && g < 150 && b < 150 && r > g+40) return {name: "珊瑚浅红 (Coral Energy)", desc: "积极而不具有攻击性。你热爱生活，懂得在追求目标的过程中享受当下的美好，是一种极具感染力的生命色。"};
        if (b > 150 && g > 150 && r < 120) return {name: "薄荷淡青 (Mint Logic)", desc: "头脑清醒且极度舒适。你擅长把复杂的问题简单化，不仅自己活得通透，也能让周围的人感到轻松。"};
        return {name: "摩登中灰 (Neutral Grey)", desc: "理智且独立。你深谙平衡之道，既不盲从热血，也不陷入忧郁。你是一个极佳的观察者和决策辅助者。"};
    }
</script>

</body>
</html>
